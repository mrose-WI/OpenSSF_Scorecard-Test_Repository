# To get started with Dependabot version updates, you'll need to specify which
# package ecosystems to update and where the package manifests are located.
# Please see the documentation for all configuration options:
# https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

version: 2
updates:
  # --- GitHub Actions updates ---
  - package-ecosystem: "github-actions"
    directory: "/"                    # required for scanning .github/workflows
    schedule:
      interval: "cron"
      cronjob: "*/10 * * * *"         # every 10 minutes
      timezone: "Europe/Berlin"
    open-pull-requests-limit: 10
    labels: ["dependencies", "github-actions"]
    commit-message:
      prefix: "deps(actions)"
      include: "scope"

  # --- uv dependency updates ---
  - package-ecosystem: "uv"           # NEW official ecosystem
    directory: "/"                    # where pyproject.toml + uv.lock exist
    schedule:
      interval: "cron"
      cronjob: "*/10 * * * *"         # every 10 minutes
      timezone: "Europe/Berlin"
    open-pull-requests-limit: 10
    labels: ["dependencies", "uv", "python"]
    commit-message:
      prefix: "deps(uv)"
      include: "scope"

    # Optional grouping (batch all uv updates into a single PR)
    groups:
      uv-all:
        patterns: ["*"]
